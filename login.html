<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bindr — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo">
      <span class="logo-mark">B</span>
      <span>Bindr</span>
    </a>
    <div class="header-actions">
      <a href="index.html" class="btn btn-ghost">← Home</a>
    </div>
  </header>

  <main class="login-stage">
    <div class="binder-cover">
      <div class="cover-rings">
        <span class="cr"></span><span class="cr"></span><span class="cr"></span>
        <span class="cr"></span><span class="cr"></span><span class="cr"></span>
      </div>
      <div class="cover-logo">Bindr</div>
      <div class="cover-tag">Organizing Success</div>

      <div class="cover-actions">
        <button id="btnShowLogin" class="btn btn-lg">Log In</button>
        <button id="btnShowSignup" class="btn btn-lg outline">Sign Up</button>
      </div>

      <!-- Login form -->
      <form id="formLogin" class="cover-form">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />
        </div>
        <div class="field" style="margin-top: 12px;">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <button class="btn" type="submit">Log In →</button>
      </form>

      <!-- Signup form -->
      <form id="formSignup" class="cover-form">
        <div class="field">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required />
        </div>
        <div class="field" style="margin-top: 12px;">
          <label for="signupPassword">Create a password</label>
          <input type="password" id="signupPassword" placeholder="At least 8 characters" required />
        </div>
        <button class="btn" type="submit">Create Account →</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-bottom" style="border: none; padding-top: 0;">
        <span>© 2026 Bindr Inc.</span>
        <div class="social-icons">
          <a href="#" aria-label="Instagram">ig</a>
          <a href="#" aria-label="Twitter">x</a>
          <a href="#" aria-label="LinkedIn">in</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>

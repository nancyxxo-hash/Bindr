<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bindr — Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo"><span class="logo-mark">B</span><span>Bindr</span></a>
    <div class="header-actions">
      <a href="login.html" class="btn btn-ghost">Log In</a>
      <a href="login.html" class="btn btn-primary">Sign Up</a>
    </div>
  </header>

  <main class="page section">
    <h1 class="section-title">Map</h1>
    <p class="section-subtitle">Active Bindr profiles across the world. Click a pin to see who's nearby.</p>

    <div id="mapStage" class="map-stage">
      <!-- Decorative world silhouette in SVG -->
      <svg class="map-svg" viewBox="0 0 1000 540" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
        <defs>
          <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
            <circle cx="3" cy="3" r="1.6" fill="#cdb6ec" />
          </pattern>
        </defs>
        <!-- Pseudo "continents" as soft purple shapes -->
        <ellipse cx="190" cy="200" rx="150" ry="90" fill="url(#dots)" opacity="0.7" />
        <ellipse cx="500" cy="190" rx="160" ry="80" fill="url(#dots)" opacity="0.7" />
        <ellipse cx="780" cy="240" rx="170" ry="110" fill="url(#dots)" opacity="0.7" />
        <ellipse cx="350" cy="380" rx="100" ry="70" fill="url(#dots)" opacity="0.7" />
        <ellipse cx="600" cy="400" rx="120" ry="60" fill="url(#dots)" opacity="0.7" />
      </svg>

      <div class="map-legend">
        <strong>4,812 active profiles</strong><br/>
        <span style="color: var(--muted); font-size: 0.85rem;">Across 38 countries · Updated live</span>
      </div>
    </div>

    <div style="margin-top: 36px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px;">
      <div style="background: white; border: 1px solid var(--border); border-radius: 12px; padding: 18px;">
        <div style="font-family: var(--font-display); font-size: 1.6rem; color: var(--purple-700); font-weight: 700;">1,240</div>
        <div style="color: var(--muted); font-size: 0.85rem;">United States</div>
      </div>
      <div style="background: white; border: 1px solid var(--border); border-radius: 12px; padding: 18px;">
        <div style="font-family: var(--font-display); font-size: 1.6rem; color: var(--purple-700); font-weight: 700;">820</div>
        <div style="color: var(--muted); font-size: 0.85rem;">Canada</div>
      </div>
      <div style="background: white; border: 1px solid var(--border); border-radius: 12px; padding: 18px;">
        <div style="font-family: var(--font-display); font-size: 1.6rem; color: var(--purple-700); font-weight: 700;">612</div>
        <div style="color: var(--muted); font-size: 0.85rem;">United Kingdom</div>
      </div>
      <div style="background: white; border: 1px solid var(--border); border-radius: 12px; padding: 18px;">
        <div style="font-family: var(--font-display); font-size: 1.6rem; color: var(--purple-700); font-weight: 700;">478</div>
        <div style="color: var(--muted); font-size: 0.85rem;">Nigeria</div>
      </div>
      <div style="background: white; border: 1px solid var(--border); border-radius: 12px; padding: 18px;">
        <div style="font-family: var(--font-display); font-size: 1.6rem; color: var(--purple-700); font-weight: 700;">404</div>
        <div style="color: var(--muted); font-size: 0.85rem;">India</div>
      </div>
      <div style="background: white; border: 1px solid var(--border); border-radius: 12px; padding: 18px;">
        <div style="font-family: var(--font-display); font-size: 1.6rem; color: var(--purple-700); font-weight: 700;">312</div>
        <div style="color: var(--muted); font-size: 0.85rem;">Germany</div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-bottom" style="border:none; padding-top:0;">
        <span>© 2026 Bindr Inc.</span>
        <div class="social-icons"><a href="#">ig</a><a href="#">x</a><a href="#">in</a></div>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>

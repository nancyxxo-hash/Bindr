<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bindr — Home</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="binder-page app-page">

  <!-- Binder tabs on the right -->
  <nav class="binder-tabs-right" id="binderTabs">
    <div class="tab active" data-page="home" onclick="switchTab('home')">
      <span class="tab-icon">⌂</span>
      <span class="tab-label">Home</span>
    </div>
    <div class="tab" data-page="profile" onclick="switchTab('profile')">
      <span class="tab-icon">◉</span>
      <span class="tab-label">Profile</span>
    </div>
    <div class="tab" data-page="messages" onclick="switchTab('messages')">
      <span class="tab-icon">✉</span>
      <span class="tab-label">Messages</span>
    </div>
    <div class="tab" data-page="matches" onclick="switchTab('matches')">
      <span class="tab-icon">★</span>
      <span class="tab-label">Matches</span>
    </div>
    <div class="tab" data-page="extras" onclick="switchTab('extras')">
      <span class="tab-icon">✦</span>
      <span class="tab-label">Extras</span>
    </div>
  </nav>

  <!-- ======================== HOME TAB ======================== -->
  <section class="tab-content active" id="tab-home">
    <div class="swipe-container">
      <h2 class="section-heading">Discover</h2>

      <div class="card-stack" id="cardStack">
        <!-- Cards injected by JS -->
        <div class="swipe-card" id="currentCard">
          <div class="card-photo-wrap">
            <img src="https://placehold.co/400x500/7c3aed/fff?text=Profile" alt="Profile" class="card-photo" id="cardPhoto" />
          </div>
          <div class="card-info">
            <h3 class="card-name" id="cardName">Loading…</h3>
            <p class="card-meta" id="cardMeta"></p>
            <p class="card-seeking" id="cardSeeking"></p>
          </div>
        </div>
        <div class="card-empty" id="noMoreCards" style="display:none">
          <p>You've seen everyone for now!</p>
          <p class="sub">Check back soon for new profiles.</p>
        </div>
      </div>

      <div class="swipe-actions">
        <button class="swipe-btn pass" onclick="swipe('left')" title="Pass">✕</button>
        <button class="swipe-btn match" onclick="swipe('right')" title="Match">○</button>
      </div>
    </div>
  </section>

  <!-- ======================== PROFILE TAB ======================== -->
  <section class="tab-content" id="tab-profile">
    <div class="profile-view">
      <h2 class="section-heading">My Profile</h2>

      <div class="profile-photo-block">
        <div class="profile-photo-wrap" onclick="triggerPhotoUpload()">
          <img src="https://placehold.co/200x200/7c3aed/fff?text=Photo" alt="Profile" id="myProfilePhoto" />
          <div class="photo-edit-overlay">Change Photo</div>
        </div>
        <input type="file" id="myPhotoInput" accept="image/*" hidden onchange="updateProfilePhoto(this)" />
      </div>

      <div class="profile-fields" id="profileFields">
        <!-- Populated by JS based on account type -->
      </div>
    </div>
  </section>

  <!-- ======================== MESSAGES TAB ======================== -->
  <section class="tab-content" id="tab-messages">
    <div class="messages-view">
      <h2 class="section-heading">Messages</h2>
      <div class="message-list" id="messageList">
        <!-- Populated by JS -->
        <p class="empty-state">No messages yet. Start matching to connect!</p>
      </div>
      <div class="message-thread" id="messageThread" style="display:none">
        <div class="thread-header">
          <button onclick="closeThread()" class="btn-ghost small">← Back</button>
          <h3 id="threadName"></h3>
        </div>
        <div class="thread-messages" id="threadMessages"></div>
        <div class="thread-input">
          <input type="text" id="messageInput" placeholder="Type a message…" onkeydown="if(event.key==='Enter') sendMessage()" />
          <button class="btn-primary" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ======================== MATCHES TAB ======================== -->
  <section class="tab-content" id="tab-matches">
    <div class="matches-view">
      <h2 class="section-heading">Matches</h2>
      <div class="matches-grid" id="matchesGrid">
        <p class="empty-state">No matches yet — keep swiping!</p>
      </div>
    </div>
  </section>

  <!-- ======================== EXTRAS TAB ======================== -->
  <section class="tab-content" id="tab-extras">
    <div class="extras-view">
      <h2 class="section-heading">Extras</h2>
      <div class="extras-grid" id="extrasGrid">
        <!-- Populated by JS based on account type -->
      </div>
    </div>
  </section>

  <!-- MATCH MODAL -->
  <div class="match-modal" id="matchModal" style="display:none">
    <div class="match-modal-content">
      <div class="match-confetti">✦ ✦ ✦</div>
      <h2>It's a Match!</h2>
      <div class="match-photos">
        <img id="matchMyPhoto" src="" alt="You" />
        <span class="match-heart">♥</span>
        <img id="matchTheirPhoto" src="" alt="Match" />
      </div>
      <p id="matchName" class="match-name"></p>
      <div class="match-actions">
        <button class="btn-primary" onclick="goToMessages()">Send a Message</button>
        <button class="btn-ghost" onclick="closeMatchModal()">Keep Swiping</button>
      </div>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

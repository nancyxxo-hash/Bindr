<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bindr</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/login.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="binder-cover">

  <!-- Binder spine decoration -->
  <div class="binder-spine"></div>
  <div class="binder-rings">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
  </div>

  <main class="cover-content">
    <div class="logo-lockup">
      <h1 class="logo">Bindr</h1>
      <p class="tagline">Organizing Success</p>
    </div>

    <div class="auth-buttons" id="authButtons">
      <button class="btn-primary" onclick="showPanel('login')">Login</button>
      <button class="btn-secondary" onclick="window.location.href='subscription.html'">Sign Up</button>
    </div>

    <!-- Login Panel -->
    <div class="auth-panel" id="loginPanel">
      <h2>Welcome Back</h2>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <p class="error-msg" id="loginError"></p>
      <button class="btn-primary full-width" onclick="handleLogin()">Login</button>
      <button class="btn-ghost" onclick="hidePanel()">← Back</button>
    </div>

    <!-- Signup Panel -->
    <div class="auth-panel" id="signupPanel">
      <h2>Create Account</h2>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Min. 8 characters" />
      </div>
      <p class="error-msg" id="signupError"></p>
      <button class="btn-primary full-width" onclick="handleSignup()">Continue →</button>
      <button class="btn-ghost" onclick="hidePanel()">← Back</button>
    </div>
  </main>

  <footer class="cover-footer">Bindr. Organizing Success</footer>

  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>

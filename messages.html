<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bindr — Messages</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo"><span class="logo-mark">B</span><span>Bindr</span></a>
    <div class="header-actions">
      <a href="home.html" class="btn btn-ghost">Home</a>
      <a href="login.html" class="btn btn-secondary">Log Out</a>
    </div>
  </header>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sb-logo">Bindr</div>
      <a href="home.html"><span class="sb-icon">🏠</span> Home</a>
      <a href="profile.html"><span class="sb-icon">👤</span> Profile</a>
      <a href="matches.html"><span class="sb-icon">🔗</span> Matches</a>
      <a href="messages.html" class="active"><span class="sb-icon">💬</span> Messages</a>
      <a href="notifications.html"><span class="sb-icon">🔔</span> Notifications</a>
      <a href="dashboard.html"><span class="sb-icon">📊</span> Dashboard</a>
      <a href="addons.html"><span class="sb-icon">✨</span> Extras</a>
      <div class="sb-bottom">
        <a href="map.html"><span class="sb-icon">🗺</span> Map</a>
        <a href="community.html"><span class="sb-icon">👥</span> Community</a>
        <a href="content.html"><span class="sb-icon">📰</span> Content</a>
      </div>
    </aside>

    <main class="binder-page">
      <div class="page-header">
        <div>
          <span class="crumb">Messages</span>
          <h1>Direct messages</h1>
        </div>
      </div>

      <div class="msg-layout">

        <!-- Thread list -->
        <div class="msg-list">
          <div class="msg-list-header">
            <strong data-user-name>Messages</strong>
          </div>
          <div id="msgThreadList">
            <div class="msg-loading">Loading conversations…</div>
          </div>
        </div>

        <!-- Empty state: no conversation selected -->
        <div class="msg-conv" id="msgConvEmpty">
          <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--muted); text-align:center; padding: 40px;">
            <div style="font-size: 3rem; margin-bottom: 16px;">💬</div>
            <h3 style="margin-bottom: 8px; color: var(--text);">Select a conversation</h3>
            <p style="font-size: 0.9rem;">Choose a match from the left to start messaging.</p>
          </div>
        </div>

        <!-- Active conversation (hidden until a thread is selected) -->
        <div class="msg-conv" id="msgConvActive" style="display:none;">
          <div class="msg-conv-header" id="msgConvHeader"></div>
          <div class="msg-conv-body" id="msgConvBody"></div>
          <div class="msg-input-row">
            <input id="msgInput" type="text" placeholder="Select a conversation first…" disabled />
            <button id="msgSend" disabled>Send</button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-bottom" style="border:none; padding-top:0;">
        <span>© 2026 Bindr Inc.</span>
        <div class="social-icons"><a href="#">ig</a><a href="#">x</a><a href="#">in</a></div>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
